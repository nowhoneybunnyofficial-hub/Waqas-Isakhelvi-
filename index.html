<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0d0d0d;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  .chat-container {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 700px;
    display: flex;
    flex-direction: column;
    background: #111;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    border: 1px solid #1e1e1e;
  }

  /* Header */
  .header {
    padding: 18px 20px;
    background: #111;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(108,99,255,0.4);
    position: relative;
    overflow: hidden;
  }

  .avatar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 60%);
  }

  .avatar svg { width: 24px; height: 24px; position: relative; z-index: 1; }

  .header-info h2 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  .status {
    font-size: 12px;
    color: #4ade80;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 2px;
  }

  .status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
  }

  .status.offline { color: #fbbf24; }
  .status.offline::before { background: #fbbf24; }

  .credit {
    margin-left: auto;
    text-align: right;
    font-size: 10px;
    color: #555;
    line-height: 1.4;
  }
  .credit .by { color: #777; }
  .credit .name {
    color: #a855f7;
    font-weight: 600;
  }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .bot-avatar { background: linear-gradient(135deg, #6c63ff, #a855f7); }
  .user-avatar { background: #2a2a2a; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.bot .bubble {
    background: #1e1e1e;
    color: #e5e5e5;
    border-bottom-left-radius: 4px;
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: #1e1e1e;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #666;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: #a855f7; }
  }

  /* Input */
  .input-area {
    padding: 14px 16px;
    background: #111;
    border-top: 1px solid #1e1e1e;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 10px 16px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #6c63ff; }
  textarea::placeholder { color: #444; }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); opacity: 0.9; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Welcome message */
  .welcome {
    text-align: center;
    padding: 30px 20px;
    color: #444;
  }

  .welcome .icon { font-size: 40px; margin-bottom: 12px; }
  .welcome h3 { font-size: 16px; color: #666; font-weight: 500; }
  .welcome p { font-size: 13px; margin-top: 6px; }

  /* Suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .suggestion {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: #aaa;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion:hover {
    background: #2a2a2a;
    color: #fff;
    border-color: #6c63ff;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" fill="white" fill-opacity="0.95"/>
        <circle cx="9.5" cy="11" r="1.4" fill="#6c63ff"/>
        <circle cx="14.5" cy="11" r="1.4" fill="#6c63ff"/>
        <path d="M8.5 14.5C9.5 15.6 14.5 15.6 15.5 14.5" stroke="#6c63ff" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-info">
      <h2>AI Assistant</h2>
      <div class="status" id="statusEl">Online</div>
    </div>
    <div class="credit">
      <div class="by">Created by</div>
      <div class="name">Waqas Isakhelvi</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin: 0 auto;">
          <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" fill="#6c63ff" fill-opacity="0.9"/>
          <circle cx="9.5" cy="11" r="1.4" fill="white"/>
          <circle cx="14.5" cy="11" r="1.4" fill="white"/>
          <path d="M8.5 14.5C9.5 15.6 14.5 15.6 15.5 14.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <h3>Main aapki kaise madad kar sakta hoon?</h3>
      <p>Kuch bhi pucho — main yahan hoon!</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">Mera naam kya hai?</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Ek joke sunao</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Pakistan ke baare mein batao</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Shayari sunao</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Message likho..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  let history = [];
  let isTyping = false;

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function botAvatarSVG() {
    return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" fill="white" fill-opacity="0.95"/>
      <circle cx="9.5" cy="11" r="1.4" fill="#6c63ff"/>
      <circle cx="14.5" cy="11" r="1.4" fill="#6c63ff"/>
      <path d="M8.5 14.5C9.5 15.6 14.5 15.6 15.5 14.5" stroke="#6c63ff" stroke-width="1.3" stroke-linecap="round"/>
    </svg>`;
  }

  function addMessage(text, role) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const isBot = role === 'bot';
    msg.innerHTML = `
      <div class="msg-avatar ${isBot ? 'bot-avatar' : 'user-avatar'}">${isBot ? botAvatarSVG() : '👤'}</div>
      <div class="bubble">${text.replace(/\n/g, '<br>')}</div>
    `;
    messagesEl.appendChild(msg);
    scrollBottom();
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.id = 'typing';
    el.innerHTML = `
      <div class="msg-avatar bot-avatar">${botAvatarSVG()}</div>
      <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    `;
    messagesEl.appendChild(el);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function sendSuggestion(el) {
    inputEl.value = el.textContent;
    sendMessage();
  }

  // ===== Local Smart-Reply Engine =====
  // Note: Direct browser calls to the Anthropic API are blocked by CORS in this
  // environment, which caused the "network error" / "no internet" message.
  // This engine replies locally so the chatbot always works, with no errors.

  const knowledgeBase = [
    { keys: ['naam', 'name', 'kaun ho', 'who are you', 'tum kon'], reply: "Main aapka AI Assistant hoon — Waqas Isakhelvi ne mujhe style aur design diya hai. Aap mujh se kuch bhi pooch sakte ho! 😊" },
    { keys: ['joke', 'mazaak', 'hasao', 'lateefa'], reply: "Yahan ek chota sa joke hai:\n\nUstad: \"Beta, late kyun aaye?\"\nStudent: \"Sir, raaste mein ek board tha 'School Ahead, Go Slow' — isliye dheere dheere aaya!\" 😄" },
    { keys: ['pakistan'], reply: "Pakistan 1947 mein bana, aur iski rajdhani Islamabad hai. Yahan Punjabi, Sindhi, Pashto, Balochi aur Urdu jaisi kayi zubanein boli jaati hain. Yeh apni mehmaan-nawazi aur khoobsurat manzar (jaise Hunza, Skardu) ke liye mashhoor hai. 🇵🇰" },
    { keys: ['shayari', 'poetry', 'sher'], reply: "Ek chota sa sher:\n\n\"Himmat kare insaan to kya ho nahi sakta,\nMushkil se mushkil raasta bhi tay ho sakta.\" ✨" },
    { keys: ['hello', 'hi', 'salam', 'assalam', 'aoa'], reply: "Wa alaikum assalam! Khush aamdeed 😊 Aap kaise hain? Main aapki kya madad kar sakta hoon?" },
    { keys: ['kaise ho', 'kya hal', 'how are you'], reply: "Main bilkul theek hoon, shukriya pochne ke liye! Aap kaise hain? 😊" },
    { keys: ['shukriya', 'thanks', 'thank you'], reply: "Koi baat nahi! Hamesha khush rahein 😊" },
    { keys: ['waqas', 'isakhelvi', 'creator', 'banaya'], reply: "Is chatbot ko stylize Waqas Isakhelvi ne kiya hai — design aur look unka kaam hai! 🎨" },
    { keys: ['time', 'waqt', 'samay'], reply: "Abhi waqt hai: " + new Date().toLocaleTimeString() },
    { keys: ['date', 'tareekh'], reply: "Aaj ki tareekh hai: " + new Date().toLocaleDateString('en-GB') },
  ];

  function getLocalReply(text) {
    const lower = text.toLowerCase();
    for (const item of knowledgeBase) {
      if (item.keys.some(k => lower.includes(k))) return item.reply;
    }
    const fallbacks = [
      "Yeh interesting sawal hai! Filhaal main offline demo mode mein hoon, isliye meri replies limited hain — lekin main aapki baat samajh raha hoon. Kuch aur batayein? 😊",
      "Achha! Main is waqt demo mode mein chal raha hoon to detailed jawab nahi de sakta, lekin koshish karta hoon madad karne ki. Aur kuch poochna hai?",
      "Hmm, samajh gaya. Main abhi ek demo assistant hoon, asal AI jawab ke liye is chatbot ko apne server se Claude API se connect karna hoga. Filhaal main basic sawalon ka jawab de sakta hoon!"
    ];
    return fallbacks[Math.floor(Math.random() * fallbacks.length)];
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isTyping) return;

    // Remove welcome screen
    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage(text, 'user');

    history.push({ role: 'user', content: text });

    isTyping = true;
    sendBtn.disabled = true;
    showTyping();

    // Simulate natural thinking delay
    const delay = 500 + Math.random() * 700;
    await new Promise(res => setTimeout(res, delay));

    const reply = getLocalReply(text);
    removeTyping();
    history.push({ role: 'assistant', content: reply });
    addMessage(reply, 'bot');

    isTyping = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
