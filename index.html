<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chat Bot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #0d0d0d;
    font-family: 'Segoe UI', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
  }

  .chat-container {
    width: 100%;
    max-width: 480px;
    height: 100vh;
    max-height: 700px;
    display: flex;
    flex-direction: column;
    background: #111;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    border: 1px solid #1e1e1e;
  }

  .header {
    padding: 18px 20px;
    background: #111;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 14px;
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
    box-shadow: 0 4px 14px rgba(108,99,255,0.4);
    position: relative;
    overflow: hidden;
  }

  .avatar::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 60%);
  }

  .avatar svg { width: 24px; height: 24px; position: relative; z-index: 1; }

  .header-info h2 {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
  }

  .status {
    font-size: 12px;
    color: #4ade80;
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 2px;
  }

  .status::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #4ade80;
  }

  .status.offline { color: #fbbf24; }
  .status.offline::before { background: #fbbf24; }

  .credit {
    margin-left: auto;
    text-align: right;
    font-size: 10px;
    color: #555;
    line-height: 1.4;
  }
  .credit .by { color: #777; }
  .credit .name {
    color: #a855f7;
    font-weight: 600;
  }

  .new-chat-btn {
    background: none;
    border: 1px solid #2a2a2a;
    color: #888;
    width: 32px;
    height: 32px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .new-chat-btn:active { background: #1e1e1e; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

  .msg {
    display: flex;
    gap: 8px;
    max-width: 85%;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    flex-direction: row-reverse;
  }

  .msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    margin-top: 2px;
  }

  .bot-avatar { background: linear-gradient(135deg, #6c63ff, #a855f7); }
  .user-avatar { background: #2a2a2a; }

  .bubble {
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.bot .bubble {
    background: #1e1e1e;
    color: #e5e5e5;
    border-bottom-left-radius: 4px;
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .search-tag {
    font-size: 11px;
    color: #a855f7;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .typing {
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: #1e1e1e;
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #666;
    animation: bounce 1.2s infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30% { transform: translateY(-6px); background: #a855f7; }
  }

  .input-area {
    padding: 14px 16px;
    background: #111;
    border-top: 1px solid #1e1e1e;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  textarea {
    flex: 1;
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    border-radius: 20px;
    padding: 10px 16px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 100px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  textarea:focus { border-color: #6c63ff; }
  textarea::placeholder { color: #444; }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: none;
    background: linear-gradient(135deg, #6c63ff, #a855f7);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .send-btn:hover { transform: scale(1.05); opacity: 0.9; }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .welcome {
    text-align: center;
    padding: 30px 20px;
    color: #444;
  }

  .welcome .icon { font-size: 40px; margin-bottom: 12px; }
  .welcome h3 { font-size: 16px; color: #666; font-weight: 500; }
  .welcome p { font-size: 13px; margin-top: 6px; }

  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-top: 16px;
  }

  .suggestion {
    background: #1e1e1e;
    border: 1px solid #2a2a2a;
    color: #aaa;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .suggestion:hover {
    background: #2a2a2a;
    color: #fff;
    border-color: #6c63ff;
  }

  .error-banner {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: #f87171;
    font-size: 12px;
    padding: 8px 12px;
    border-radius: 10px;
    margin: 0 16px 8px;
    display: none;
  }
</style>
</head>
<body>

<div class="chat-container">
  <div class="header">
    <div class="avatar">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" fill="white" fill-opacity="0.95"/>
        <circle cx="9.5" cy="11" r="1.4" fill="#6c63ff"/>
        <circle cx="14.5" cy="11" r="1.4" fill="#6c63ff"/>
        <path d="M8.5 14.5C9.5 15.6 14.5 15.6 15.5 14.5" stroke="#6c63ff" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="header-info">
      <h2>AI Assistant</h2>
      <div class="status" id="statusEl">Online</div>
    </div>
    <button class="new-chat-btn" onclick="newChat()" title="New chat">+</button>
    <div class="credit">
      <div class="by">Created by</div>
      <div class="name">Waqas Isakhelvi</div>
    </div>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="messages" id="messages">
    <div class="welcome">
      <div class="icon">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin: 0 auto;">
          <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" fill="#6c63ff" fill-opacity="0.9"/>
          <circle cx="9.5" cy="11" r="1.4" fill="white"/>
          <circle cx="14.5" cy="11" r="1.4" fill="white"/>
          <path d="M8.5 14.5C9.5 15.6 14.5 15.6 15.5 14.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
      </div>
      <h3>Main aapki kaise madad kar sakta hoon?</h3>
      <p>Kuch bhi pucho — main yahan hoon!</p>
      <div class="suggestions">
        <div class="suggestion" onclick="sendSuggestion(this)">Aaj ki taza khabar batao</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Ek joke sunao</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Pakistan ka moosam kaisa hai</div>
        <div class="suggestion" onclick="sendSuggestion(this)">Shayari sunao</div>
      </div>
    </div>
  </div>

  <div class="input-area">
    <textarea id="input" placeholder="Message likho..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://waqas-isakhelvi.vercel.app';

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const statusEl = document.getElementById('statusEl');
  const errorBanner = document.getElementById('errorBanner');
  let history = JSON.parse(localStorage.getItem('chatHistory') || '[]');
  let isTyping = false;

  if (history.length > 0) {
    document.querySelector('.welcome')?.remove();
    history.forEach(m => addMessage(m.content, m.role === 'user' ? 'user' : 'bot'));
  }

  function saveHistory() {
    localStorage.setItem('chatHistory', JSON.stringify(history));
  }

  function newChat() {
    if (!confirm('Naya chat shuru karna hai? Purana chat delete ho jayega.')) return;
    history = [];
    localStorage.removeItem('chatHistory');
    messagesEl.innerHTML = `
      <div class="welcome">
        <div class="icon">
          <svg width="44" height="44" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="margin: 0 auto;">
            <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" fill="#6c63ff" fill-opacity="0.9"/>
            <circle cx="9.5" cy="11" r="1.4" fill="white"/>
            <circle cx="14.5" cy="11" r="1.4" fill="white"/>
            <path d="M8.5 14.5C9.5 15.6 14.5 15.6 15.5 14.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
        </div>
        <h3>Main aapki kaise madad kar sakta hoon?</h3>
        <p>Kuch bhi pucho — main yahan hoon!</p>
        <div class="suggestions">
          <div class="suggestion" onclick="sendSuggestion(this)">Aaj ki taza khabar batao</div>
          <div class="suggestion" onclick="sendSuggestion(this)">Ek joke sunao</div>
          <div class="suggestion" onclick="sendSuggestion(this)">Pakistan ka moosam kaisa hai</div>
          <div class="suggestion" onclick="sendSuggestion(this)">Shayari sunao</div>
        </div>
      </div>
    `;
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 100) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function botAvatarSVG() {
    return `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 2L4 6V12C4 16.5 7.5 20.5 12 22C16.5 20.5 20 16.5 20 12V6L12 2Z" fill="white" fill-opacity="0.95"/>
      <circle cx="9.5" cy="11" r="1.4" fill="#6c63ff"/>
      <circle cx="14.5" cy="11" r="1.4" fill="#6c63ff"/>
      <path d="M8.5 14.5C9.5 15.6 14.5 15.6 15.5 14.5" stroke="#6c63ff" stroke-width="1.3" stroke-linecap="round"/>
    </svg>`;
  }

  function addMessage(text, role, searched) {
    const msg = document.createElement('div');
    msg.className = `msg ${role}`;
    const isBot = role === 'bot';
    const searchTag = searched ? `<div class="search-tag">🔍 Google se check kiya</div>` : '';
    msg.innerHTML = `
      <div class="msg-avatar ${isBot ? 'bot-avatar' : 'user-avatar'}">${isBot ? botAvatarSVG() : '👤'}</div>
      <div class="bubble">${searchTag}${escapeHtml(text).replace(/\n/g, '<br>')}</div>
    `;
    messagesEl.appendChild(msg);
    scrollBottom();
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function showTyping() {
    const el = document.createElement('div');
    el.className = 'msg bot';
    el.id = 'typing';
    el.innerHTML = `
      <div class="msg-avatar bot-avatar">${botAvatarSVG()}</div>
      <div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
    `;
    messagesEl.appendChild(el);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById('typing');
    if (el) el.remove();
  }

  function sendSuggestion(el) {
    inputEl.value = el.textContent;
    sendMessage();
  }

  function showError(text) {
    errorBanner.textContent = text;
    errorBanner.style.display = 'block';
    setTimeout(() => { errorBanner.style.display = 'none'; }, 5000);
  }

  function needsSearch(text) {
    const triggers = ['aaj', 'today', 'latest', 'news', 'khabar', 'current', 'abhi', 'moosam', 'weather', 'price', 'qeemat', 'score', 'kab', 'kaun hai', 'who is', '2025', '2026', 'recent'];
    const lower = text.toLowerCase();
    return triggers.some(t => lower.includes(t));
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isTyping) return;

    const welcome = messagesEl.querySelector('.welcome');
    if (welcome) welcome.remove();

    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMessage(text, 'user');
    history.push({ role: 'user', content: text });
    saveHistory();

    isTyping = true;
    sendBtn.disabled = true;
    showTyping();

    let searchResults = null;
    let didSearch = false;

    try {
      if (needsSearch(text)) {
        statusEl.textContent = 'Searching Google...';
        const searchRes = await fetch(`${BACKEND_URL}/api/search`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: text })
        });
        if (searchRes.ok) {
          const searchData = await searchRes.json();
          searchResults = searchData.results;
          didSearch = true;
        }
        statusEl.textContent = 'Online';
      }

      const chatRes = await fetch(`${BACKEND_URL}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: history.map(m => ({ role: m.role, content: m.content })),
          searchResults
        })
      });

      removeTyping();

      if (!chatRes.ok) {
        throw new Error('Server error: ' + chatRes.status);
      }

      const data = await chatRes.json();

      if (data.error) {
        throw new Error(data.error);
      }

      const reply = data.reply || 'Maaf karo, jawab nahi mil saka.';
      history.push({ role: 'assistant', content: reply });
      saveHistory();
      addMessage(reply, 'bot', didSearch);
      statusEl.textContent = 'Online';
      statusEl.classList.remove('offline');

    } catch (err) {
      removeTyping();
      statusEl.textContent = 'Connection issue';
      statusEl.classList.add('offline');
      showError('⚠️ Backend se connect nahi ho saka. Thori dair mein dobara koshish karo.');
      addMessage('Maazrat, abhi connect nahi ho pa raha. Thori dair mein dobara try karo.', 'bot');
    }

    isTyping = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
